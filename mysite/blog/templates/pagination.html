<div class="pagination mt-10 flex justify-center">
  <span class="step-links flex items-center gap-4 px-4 py-2 rounded-xl 
               bg-white/5 border border-white/10 backdrop-blur-md
               shadow-[0_0_20px_rgba(0,255,255,0.05)]">

    {% if page.has_previous %}
      <a href="?page={{ page.previous_page_number }}" 
         class="px-3 py-1 rounded-lg text-sm text-cyan-400 
                hover:bg-cyan-400/10 hover:text-cyan-300 transition">
        ← Previous
      </a>
    {% endif %}

    <span class="current text-sm text-gray-300">
      Page <span class="text-white font-medium">{{ page.number }}</span> 
      of <span class="text-purple-400">{{ page.paginator.num_pages }}</span>
    </span>

    {% if page.has_next %}
      <a href="?page={{ page.next_page_number }}" 
         class="px-3 py-1 rounded-lg text-sm text-cyan-400 
                hover:bg-cyan-400/10 hover:text-cyan-300 transition">
        Next →
      </a>
    {% endif %}

  </span>
</div>
