{% extends "blog/base.html" %}

{% block title %}Add a comment{% endblock %}

{% block content %}

{% if comment %}

<h2 class="text-2xl font-semibold text-green-400 tracking-wide">
    Your comment has been added.
</h2>

<p class="mt-4">
    <a href="{{ post.get_absolute_url }}" 
       class="text-cyan-400 hover:text-cyan-300 transition underline underline-offset-4">
        ← Back to the post
    </a>
</p>

{% else %}

<div class="mt-4">
    {% include "blog/post/includes/comment_form.html" %}
</div>

{% endif %}

{% endblock %}
